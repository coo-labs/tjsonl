name: Feature
description: New user-facing capability.
title: "Feature: <short description>"
type: Feature
body:
  - type: markdown
    attributes:
      value: |
        # Feature

        A new user-facing capability. For internal restructuring use
        **Refactor**; for housekeeping use **Chore**.

        Set Priority and Readiness in the right sidebar after creation.

  - type: textarea
    id: user-capability
    attributes:
      label: User capability
      description: What can the user do after this ships that they couldn't do before? Frame from the user's perspective.
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance criteria
      description: Specific, falsifiable conditions for completion.
      placeholder: |
        - [ ] <condition 1>
        - [ ] <condition 2>
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: |
        Background, prior memos, related issues. Use hyphenated MEMO autolink
        form and full cross-repo form for issue references.
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: P0 (urgent) → P3 (low).
      options:
        - P2
        - P0
        - P1
        - P3
      default: 0
    validations:
      required: false

  - type: dropdown
    id: readiness
    attributes:
      label: Readiness
      description: Pickup-readiness.
      options:
        - Ready
        - Needs design
        - Needs research
        - Needs breakdown
    validations:
      required: false
