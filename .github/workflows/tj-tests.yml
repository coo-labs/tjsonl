name: tj tests

on:
  pull_request:
    paths:
      - "src/**"
      - "spec/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/tj-tests.yml"
  push:
    branches: [main]
    paths:
      - "src/**"
      - "spec/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/tj-tests.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"
      - name: Unit tests
        # Integration test skips when transcripts/ is empty (CI has no R2 cache).
        run: pytest -v
